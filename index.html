// ─── SHARED COMPONENTS ────────────────────────────────────────────────────────
const Btn=({children,variant='primary',size='md',onClick,disabled,style={}})=>{
  const base={display:'inline-flex',alignItems:'center',gap:6,border:'none',borderRadius:8,fontFamily:'var(--sans)',fontWeight:500,cursor:disabled?'not-allowed':'pointer',opacity:disabled?.5:1,transition:'all .15s',...style};
  const sizes={sm:{padding:'5px 12px',fontSize:12},md:{padding:'8px 16px',fontSize:13},lg:{padding:'11px 22px',fontSize:14}};
  const variants={
    primary:{background:'var(--accent)',color:'#fff'},
    success:{background:'var(--accent2)',color:'#fff'},
    danger:{background:'var(--danger)',color:'#fff'},
    ghost:{background:'transparent',color:'var(--muted)',border:'1px solid var(--border)'},
    warn:{background:'var(--warn)',color:'#000'},
  };
  return<button style={{...base,...sizes[size],...variants[variant]}} onClick={onClick} disabled={disabled}>{children}</button>;
};

const Badge=({children,color='blue'})=>{
  const colors={blue:{bg:'rgba(59,130,246,.15)',c:'#60a5fa'},green:{bg:'rgba(16,185,129,.15)',c:'#34d399'},amber:{bg:'rgba(245,158,11,.15)',c:'#fbbf24'},red:{bg:'rgba(239,68,68,.15)',c:'#f87171'},purple:{bg:'rgba(168,85,247,.15)',c:'#c084fc'},gray:{bg:'rgba(139,148,158,.15)',c:'#8b949e'}};
  const s=colors[color]||colors.gray;
  return<span style={{background:s.bg,color:s.c,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600,letterSpacing:.4}}>{children}</span>;
};

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
const Dashboard=({user,clients,evaluations,setPage})=>{
  const myClients=user.role==='manager'?clients:clients.filter(c=>c.assignedTo===user.id);
  const myEvals=evaluations.filter(e=>user.role==='manager'||e.evaluatorId===user.id);
  const overdueClients=myClients.filter(c=>isOverdue(c.nextDueDate)&&c.status==='active');
  const dueSoon=myClients.filter(c=>{const d=daysUntil(c.nextDueDate);return d!==null&&d>=0&&d<=5&&c.status==='active'});
  const completedThisMonth=myEvals.filter(e=>{const d=new Date(e.completedAt||'');const n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear()&&e.status==='complete'}).length;
  const avgScore=myEvals.filter(e=>e.status==='complete'&&e.overallScore).reduce((a,e,i,arr)=>i===arr.length-1?(a+e.overallScore)/arr.length:a+e.overallScore,0);

  const stats=[
    {label:'Active Clients',value:myClients.filter(c=>c.status==='active').length,color:'var(--accent)'},
    {label:'Completed This Month',value:completedThisMonth,color:'var(--accent2)'},
    {label:'Overdue',value:overdueClients.length,color:'var(--danger)'},
    {label:'Avg Score',value:myEvals.filter(e=>e.status==='complete'&&e.overallScore).length>0?Math.round(avgScore*10)/10+'%':'—',color:'var(--warn)'},
  ];

  return(
    <div className="fade-in">
      <div style={{marginBottom:28}}>
        <h2 style={{fontFamily:'var(--serif)',fontSize:26,fontWeight:400,marginBottom:4}}>Good {new Date().getHours()<12?'morning':'afternoon'}, {user.name.split(' ')[0]}</h2>
        <p style={{color:'var(--muted)',fontSize:13}}>{new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:28}}>
        {stats.map(s=>(
          <Card key={s.label} style={{textAlign:'center'}}>
            <div style={{fontSize:32,fontFamily:'var(--serif)',color:s.color,marginBottom:4}}>{s.value}</div>
            <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.6}}>{s.label}</div>
          </Card>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
        <Card>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <h3 style={{fontFamily:'var(--serif)',fontSize:16,fontWeight:400}}>🔴 Overdue Evaluations</h3>
            <Badge color="red">{overdueClients.length}</Badge>
          </div>
          {overdueClients.length===0?<p style={{color:'var(--muted)',fontSize:13}}>All caught up! ✅</p>:
            overdueClients.slice(0,5).map(c=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontSize:13,fontWeight:500}}>{c.storeName}</div>
                  <div style={{fontSize:11,color:'var(--danger)'}}>Due {fmtDate(c.nextDueDate)}</div>
                </div>
                <Btn size="sm" onClick={()=>setPage('evaluations')}>Evaluate</Btn>
              </div>
            ))
          }
        </Card>
        <Card>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <h3 style={{fontFamily:'var(--serif)',fontSize:16,fontWeight:400}}>⚠️ Due Soon</h3>
            <Badge color="amber">{dueSoon.length}</Badge>
          </div>
          {dueSoon.length===0?<p style={{color:'var(--muted)',fontSize:13}}>Nothing urgent coming up.</p>:
            dueSoon.slice(0,5).map(c=>(
              <div key={c.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontSize:13,fontWeight:500}}>{c.storeName}</div>
                  <div style={{fontSize:11,color:'var(--warn)'}}>Due in {daysUntil(c.nextDueDate)} day{daysUntil(c.nextDueDate)!==1?'s':''}</div>
                </div>
                <Btn size="sm" variant="ghost" onClick={()=>setPage('evaluations')}>View</Btn>
              </div>
            ))
          }
        </Card>
      </div>
    </div>
  );
};

// ─── CLIENT FORM ──────────────────────────────────────────────────────────────

// ─── CLIENTS PAGE ─────────────────────────────────────────────────────────────
const ClientsPage=({user,clients,setClients,evaluations,setPage,setPendingClient})=>{
  const [modal,setModal]=useState(null);
  const [search,setSearch]=useState('');
  const [filterMake,setFilterMake]=useState('');
  const [filterScheduler,setFilterScheduler]=useState('');
  const users=USERS;
  const myClients=user.role==='manager'?clients:clients.filter(c=>c.assignedTo===user.id);
  const filtered=myClients.filter(c=>{
    const s=search.toLowerCase();
    return(!s||(c.storeName+c.location+c.contactName).toLowerCase().includes(s))
      &&(!filterMake||c.make===filterMake)
      &&(!filterScheduler||c.scheduler===filterScheduler);
  });
  const saveClient=(f)=>{
    if(modal.id){setClients(prev=>prev.map(c=>c.id===modal.id?{...c,...f}:c));}
    else{setClients(prev=>[...prev,{...f,id:genId(),createdAt:today()}]);}
    setModal(null);
  };
  const deleteClient=(id)=>{if(confirm('Delete this client?'))setClients(prev=>prev.filter(c=>c.id!==id));}
  const startEval=(client)=>{setPendingClient(client);setPage('evaluations');}

  return(
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
        <div>
          <h2 style={{fontFamily:'var(--serif)',fontSize:24,fontWeight:400}}>Clients</h2>
          <p style={{color:'var(--muted)',fontSize:13,marginTop:2}}>{filtered.length} store{filtered.length!==1?'s':''} shown</p>
        </div>
        <Btn onClick={()=>setModal({})} variant="success"><Icon.plus/>Add Client</Btn>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:18,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search stores..."
          style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,outline:'none',flex:1,minWidth:180}}/>
        <select value={filterMake} onChange={e=>setFilterMake(e.target.value)}
          style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,outline:'none'}}>
          <option value="">All Makes</option>{MAKES.map(m=><option key={m}>{m}</option>)}
        </select>
        <select value={filterScheduler} onChange={e=>setFilterScheduler(e.target.value)}
          style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:13,outline:'none'}}>
          <option value="">All Schedulers</option>{SCHEDULERS.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.length===0&&<Card style={{textAlign:'center',padding:40}}><p style={{color:'var(--muted)'}}>No clients found. Add one to get started.</p></Card>}
        {filtered.map(c=>{
          const due=daysUntil(c.nextDueDate);
          const overdue=isOverdue(c.nextDueDate)&&c.status==='active';
          const soon=due!==null&&due>=0&&due<=5&&c.status==='active';
          const lastEval=evaluations.filter(e=>e.clientId===c.id&&e.status==='complete').sort((a,b)=>b.completedAt>a.completedAt?1:-1)[0];
          const assignee=USERS.find(u=>u.id===c.assignedTo);
          return(
            <Card key={c.id} style={{borderLeft:`3px solid ${overdue?'var(--danger)':soon?'var(--warn)':'var(--border)'}`}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6,flexWrap:'wrap'}}>
                    <span style={{fontSize:15,fontWeight:600}}>{c.storeName}</span>
                    {c.location&&<span style={{fontSize:12,color:'var(--muted)'}}>📍 {c.location}</span>}
                    <Badge color={c.status==='active'?'green':c.status==='on-hold'?'amber':'gray'}>{c.status}</Badge>
                    {overdue&&<Badge color="red">⚠ Overdue</Badge>}
                    {soon&&!overdue&&<Badge color="amber">Due Soon</Badge>}
                  </div>
                  <div style={{display:'flex',gap:20,flexWrap:'wrap'}}>
                    <span style={{fontSize:12,color:'var(--muted)'}}>🚗 {c.make}</span>
                    <span style={{fontSize:12,color:'var(--muted)'}}>🖥 {c.scheduler}</span>
                    <span style={{fontSize:12,color:'var(--muted)'}}>📧 {c.contactEmail}</span>
                    {assignee&&<span style={{fontSize:12,color:'var(--muted)'}}>👤 {assignee.name}</span>}
                    <span style={{fontSize:12,color:overdue?'var(--danger)':soon?'var(--warn)':'var(--muted)'}}>
                      📅 Due: {fmtDate(c.nextDueDate)}
                    </span>
                    {lastEval&&<span style={{fontSize:12,color:'var(--accent2)'}}>✓ Last eval: {fmtDate(lastEval.completedAt)} ({lastEval.overallScore}%)</span>}
                  </div>
                </div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <Btn size="sm" onClick={()=>startEval(c)}>Start Eval</Btn>
                  {user.role==='manager'&&<>
                    <Btn size="sm" variant="ghost" onClick={()=>setModal(c)}><Icon.edit/></Btn>
                    <Btn size="sm" variant="danger" onClick={()=>deleteClient(c.id)}><Icon.trash/></Btn>
                  </>}
                </div>
              </div>
            </Card>
          );
        })}
      </div>
      {modal&&(
        <Modal title={modal.id?'Edit Client':'Add New Client'} onClose={()=>setModal(null)} width={600}>
          <ClientForm initial={modal} onSave={saveClient} onClose={()=>setModal(null)} user={user} users={USERS}/>
        </Modal>
      )}
    </div>
  );
};

// ─── EVALUATION FORM ──────────────────────────────────────────────────────────
const EvalForm=({client,user,onSave,onCancel,clients,existing=null})=>{
  const blankAppt=()=>({id:genId(),customerId:'',scheduledDate:'',scheduledTime:'',serviceType:'',aiSummary:'',schedulerData:'',accurate:null,notes:'',scores:{},criteriaNotes:{}});
  const [step,setStep]=useState(0);
  const [appointments,setAppointments]=useState(existing?.appointments||Array.from({length:10},blankAppt));
  const [activeAppt,setActiveAppt]=useState(0);
  const [summary,setSummary]=useState({strengths:'',improvements:'',actions:'',followUp:'none',result:'',evaluatorNotes:'',clientName:client?.contactName||'',clientEmail:client?.contactEmail||''});

  const updateAppt=(i,k,v)=>setAppointments(prev=>{const a=[...prev];a[i]={...a[i],[k]:v};return a;});
  const updateScore=(apptIdx,criterionId,val)=>setAppointments(prev=>{const a=[...prev];a[apptIdx]={...a[apptIdx],scores:{...a[apptIdx].scores,[criterionId]:val}};return a;});
  const updateCritNotes=(apptIdx,criterionId,val)=>setAppointments(prev=>{const a=[...prev];a[apptIdx]={...a[apptIdx],criteriaNotes:{...a[apptIdx].criteriaNotes,[criterionId]:val}};return a;});

  const accurateCount=appointments.filter(a=>a.accurate===true).length;
  const accuracyPct=Math.round((accurateCount/10)*100);
  const avgApptScore=(appt)=>{const vals=Object.values(appt.scores||{}).filter(Boolean);return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*20):null;};
  const overallCallScore=Math.round(appointments.reduce((sum,a)=>{const s=avgApptScore(a);return s?sum+s:sum},0)/appointments.filter(a=>avgApptScore(a)!==null).length)||0;

  const steps=['Client Info','Appointments','Scoring','Summary & Submit'];
  const curAppt=appointments[activeAppt];

  const handleSave=(status)=>{
    const score=Math.round((accuracyPct+overallCallScore)/2);
    onSave({
      id:existing?.id||genId(),clientId:client.id,evaluatorId:user.id,
      evaluatorName:user.name,clientName:client.storeName,make:client.make,
      scheduler:client.scheduler,appointments,summary,overallScore:score,
      accuracyScore:accuracyPct,callScore:overallCallScore,
      status,completedAt:status==='complete'?today():null,createdAt:existing?.createdAt||today()
    });
  };

  return(
    <div className="fade-in">
      <div style={{display:'flex',gap:0,marginBottom:28,position:'relative'}}>
        {steps.map((s,i)=>(
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',cursor:'pointer'}} onClick={()=>setStep(i)}>
            <div style={{width:28,height:28,borderRadius:'50%',background:i===step?'var(--accent)':i<step?'var(--accent2)':'var(--surface2)',border:`2px solid ${i===step?'var(--accent)':i<step?'var(--accent2)':'var(--border)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,marginBottom:6,transition:'all .2s'}}>
              {i<step?'✓':i+1}
            </div>
            <div style={{fontSize:11,color:i===step?'var(--text)':'var(--muted)',fontWeight:i===step?600:400,textAlign:'center'}}>{s}</div>
          </div>
        ))}
      </div>

      {step===0&&(
        <div className="slide-in">
          <Card style={{marginBottom:16}}>
            <h3 style={{fontFamily:'var(--serif)',fontSize:16,marginBottom:16}}>Store & Evaluation Info</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <div><label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>STORE NAME</label><div style={{fontSize:14,fontWeight:600}}>{client.storeName}</div></div>
              <div><label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>MAKE</label><div style={{fontSize:14}}>{client.make}</div></div>
              <div><label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>SCHEDULER</label><div style={{fontSize:14}}>{client.scheduler}</div></div>
              <div><label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>EVALUATOR</label><div style={{fontSize:14}}>{user.name}</div></div>
              <div><label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4}}>EVAL DATE</label><div style={{fontSize:14}}>{fmtDate(today())}</div></div>
            </div>
          </Card>
          <Card>
            <h3 style={{fontFamily:'var(--serif)',fontSize:16,marginBottom:16}}>Delivery Info</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
              <Input label="Client Contact Name" value={summary.clientName} onChange={v=>setSummary(p=>({...p,clientName:v}))}/>
              <Input label="Client Email" type="email" value={summary.clientEmail} onChange={v=>setSummary(p=>({...p,clientEmail:v}))}/>
            </div>
          </Card>
          <div style={{display:'flex',justifyContent:'flex-end',marginTop:16}}>
            <Btn onClick={()=>setStep(1)}>Next: Appointments →</Btn>
          </div>
        </div>
      )}

      {step===1&&(
        <div className="slide-in">
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
            {appointments.map((a,i)=>(
              <button key={i} onClick={()=>setActiveAppt(i)}
                style={{width:36,height:36,borderRadius:8,border:`2px solid ${i===activeAppt?'var(--accent)':a.accurate===true?'var(--accent2)':a.accurate===false?'var(--danger)':'var(--border)'}`,background:i===activeAppt?'rgba(59,130,246,.15)':'transparent',color:i===activeAppt?'var(--accent)':'var(--text)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                {i+1}
              </button>
            ))}
          </div>
          <Card>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <h3 style={{fontFamily:'var(--serif)',fontSize:16}}>Appointment #{activeAppt+1}</h3>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>updateAppt(activeAppt,'accurate',true)}
                  style={{padding:'6px 14px',borderRadius:7,border:`2px solid ${curAppt.accurate===true?'var(--accent2)':'var(--border)'}`,background:curAppt.accurate===true?'rgba(16,185,129,.15)':'transparent',color:curAppt.accurate===true?'var(--accent2)':'var(--muted)',fontSize:12,fontWeight:600,cursor:'pointer'}}>
                  ✅ Accurate
                </button>
                <button onClick={()=>updateAppt(activeAppt,'accurate',false)}
                  style={{padding:'6px 14px',borderRadius:7,border:`2px solid ${curAppt.accurate===false?'var(--danger)':'var(--border)'}`,background:curAppt.accurate===false?'rgba(239,68,68,.15)':'transparent',color:curAppt.accurate===false?'var(--danger)':'var(--muted)',fontSize:12,fontWeight:600,cursor:'pointer'}}>
                  ❌ Inaccurate
                </button>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:14}}>
              <Input label="Customer / Appt ID" value={curAppt.customerId} onChange={v=>updateAppt(activeAppt,'customerId',v)} placeholder="Customer name or ID"/>
              <Input label="Scheduled Date" type="date" value={curAppt.scheduledDate} onChange={v=>updateAppt(activeAppt,'scheduledDate',v)}/>
              <Input label="Scheduled Time" type="time" value={curAppt.scheduledTime} onChange={v=>updateAppt(activeAppt,'scheduledTime',v)}/>
            </div>
            <Input label="Service Type / RO #" value={curAppt.serviceType} onChange={v=>updateAppt(activeAppt,'serviceType',v)} placeholder="e.g. Oil Change, Tire Rotation, RO #12345" style={{marginBottom:12}}/>
            <Textarea label="AI Summary (paste from AI)" value={curAppt.aiSummary} onChange={v=>updateAppt(activeAppt,'aiSummary',v)} placeholder="Copy and paste the AI-generated summary here..." rows={3} style={{marginBottom:12}}/>
            <Textarea label="Appointment from Service Scheduler (paste to prove accuracy)" value={curAppt.schedulerData} onChange={v=>updateAppt(activeAppt,'schedulerData',v)} placeholder="Copy and paste the appointment details from the service scheduler..." rows={3} style={{marginBottom:12}}/>
            <Textarea label="Issue / Notes" value={curAppt.notes} onChange={v=>updateAppt(activeAppt,'notes',v)} placeholder="Any discrepancies or observations..." rows={2}/>
          </Card>
          <div style={{display:'flex',gap:8,justifyContent:'space-between',marginTop:12}}>
            <div style={{display:'flex',gap:8}}>
              {activeAppt>0&&<Btn variant="ghost" onClick={()=>setActiveAppt(p=>p-1)}>← Prev</Btn>}
              {activeAppt<9&&<Btn variant="ghost" onClick={()=>setActiveAppt(p=>p+1)}>Next →</Btn>}
            </div>
            <div style={{display:'flex',gap:8}}>
              <Btn variant="ghost" onClick={()=>setStep(0)}>← Back</Btn>
              <Btn onClick={()=>setStep(2)}>Next: Scoring →</Btn>
            </div>
          </div>
        </div>
      )}

      {step===2&&(
        <div className="slide-in">
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
            {appointments.map((a,i)=>(
              <button key={i} onClick={()=>setActiveAppt(i)}
                style={{width:36,height:36,borderRadius:8,border:`2px solid ${i===activeAppt?'var(--accent)':avgApptScore(a)!==null?'var(--accent2)':'var(--border)'}`,background:i===activeAppt?'rgba(59,130,246,.15)':'transparent',color:i===activeAppt?'var(--accent)':'var(--text)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                {i+1}
              </button>
            ))}
          </div>
          <Card>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
              <h3 style={{fontFamily:'var(--serif)',fontSize:16}}>Appointment #{activeAppt+1} — Quality Scoring</h3>
              <div style={{fontSize:13,color:'var(--muted)'}}>
                {curAppt.customerId&&<span style={{marginRight:8}}>👤 {curAppt.customerId}</span>}
                Score: <strong style={{color:'var(--accent)'}}>{avgApptScore(curAppt)!==null?avgApptScore(curAppt)+'%':'—'}</strong>
              </div>
            </div>
            {EVAL_CRITERIA.map(c=>(
              <div key={c.id} style={{borderBottom:'1px solid var(--border)',paddingBottom:12,marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:500}}>{c.label}</span>
                  <StarRating value={curAppt.scores[c.id]||0} onChange={v=>updateScore(activeAppt,c.id,v)}/>
                </div>
                <input value={curAppt.criteriaNotes[c.id]||''} onChange={e=>updateCritNotes(activeAppt,c.id,e.target.value)}
                  placeholder="Notes (optional)"
                  style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'6px 10px',color:'var(--text)',fontSize:12,outline:'none'}}/>
              </div>
            ))}
          </Card>
          <Card style={{marginTop:12}}>
            <div style={{display:'flex',gap:24,justifyContent:'center'}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:28,fontFamily:'var(--serif)',color:accuracyPct>=95?'var(--accent2)':'var(--danger)'}}>{accuracyPct}%</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>ACCURACY ({accurateCount}/10)</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:28,fontFamily:'var(--serif)',color:overallCallScore>=90?'var(--accent2)':'var(--warn)'}}>{overallCallScore||'—'}%</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>AVG CALL QUALITY</div>
              </div>
            </div>
          </Card>
          <div style={{display:'flex',gap:8,justifyContent:'space-between',marginTop:12}}>
            <div style={{display:'flex',gap:8}}>
              {activeAppt>0&&<Btn variant="ghost" onClick={()=>setActiveAppt(p=>p-1)}>← Prev</Btn>}
              {activeAppt<9&&<Btn variant="ghost" onClick={()=>setActiveAppt(p=>p+1)}>Next →</Btn>}
            </div>
            <div style={{display:'flex',gap:8}}>
              <Btn variant="ghost" onClick={()=>setStep(1)}>← Back</Btn>
              <Btn onClick={()=>setStep(3)}>Next: Summary →</Btn>
            </div>
          </div>
        </div>
      )}

      {step===3&&(
        <div className="slide-in">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:20}}>
            <Card style={{textAlign:'center'}}>
              <div style={{fontSize:28,fontFamily:'var(--serif)',color:accuracyPct>=95?'var(--accent2)':'var(--danger)'}}>{accuracyPct}%</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>ACCURACY SCORE</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Target: 95%+</div>
            </Card>
            <Card style={{textAlign:'center'}}>
              <div style={{fontSize:28,fontFamily:'var(--serif)',color:overallCallScore>=90?'var(--accent2)':'var(--warn)'}}>{overallCallScore||'—'}%</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>AVG CALL QUALITY</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>Target: 90%+</div>
            </Card>
            <Card style={{textAlign:'center'}}>
              <div style={{fontSize:28,fontFamily:'var(--serif)',color:Math.round((accuracyPct+overallCallScore)/2)>=90?'var(--accent2)':'var(--danger)'}}>
                {Math.round((accuracyPct+(overallCallScore||0))/2)}%
              </div>
              <div style={{fontSize:11,color:'var(--muted)'}}>OVERALL SCORE</div>
            </Card>
          </div>

          <div style={{marginBottom:12}}>
            <label style={{fontSize:12,fontWeight:600,color:'var(--muted)',display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:.6}}>Evaluation Result</label>
            <div style={{display:'flex',gap:10}}>
              {['PASS','NEEDS IMPROVEMENT','FAIL'].map(r=>(

// ─── EVALUATIONS PAGE ─────────────────────────────────────────────────────────
const EvaluationsPage=({user,clients,evaluations,setEvaluations,setClients,pendingClient,setPendingClient})=>{
  const [selected,setSelected]=useState(pendingClient||null);
  const [editing,setEditing]=useState(null);

  useEffect(()=>{if(pendingClient){setSelected(pendingClient);setPendingClient(null);}
  },[pendingClient]);

  const myClients=user.role==='manager'?clients:clients.filter(c=>c.assignedTo===user.id);
  const myEvals=evaluations.filter(e=>user.role==='manager'||e.evaluatorId===user.id);
  const inProgress=myEvals.filter(e=>e.status==='draft');

  const saveEval=(data)=>{
    setEvaluations(prev=>{
      const existing=prev.find(e=>e.id===data.id);
      if(existing)return prev.map(e=>e.id===data.id?data:e);
      return[...prev,data];
    });
    if(data.status==='complete'){
      setClients(prev=>prev.map(c=>c.id===selected.id?{...c,nextDueDate:addDays(today(),CYCLE_DAYS)}:c));
    }
    setSelected(null);setEditing(null);
  };

  if(selected||editing){
    const client=editing?clients.find(c=>c.id===editing.clientId):selected;
    return(
      <div className="fade-in">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:22}}>
          <button onClick={()=>{setSelected(null);setEditing(null);}} style={{background:'none',border:'none',color:'var(--muted)',fontSize:13,cursor:'pointer'}}>← Evaluations</button>
          <span style={{color:'var(--border)'}}>›</span>
          <span style={{fontSize:13,fontWeight:600}}>{client?.storeName}</span>
        </div>
        <EvalForm client={client} user={user} onSave={saveEval} onCancel={()=>{setSelected(null);setEditing(null);}} existing={editing}/>
      </div>
    );
  }

  return(
    <div className="fade-in">
      <div style={{marginBottom:22}}>
        <h2 style={{fontFamily:'var(--serif)',fontSize:24,fontWeight:400}}>Evaluations</h2>
        <p style={{color:'var(--muted)',fontSize:13,marginTop:2}}>Start a new evaluation or continue a draft</p>
      </div>

      {inProgress.length>0&&(
        <div style={{marginBottom:24}}>
          <h3 style={{fontSize:13,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,marginBottom:12}}>In Progress</h3>
          {inProgress.map(e=>(
            <Card key={e.id} style={{marginBottom:8,borderLeft:'3px solid var(--warn)'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{e.clientName}</div>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Started {fmtDate(e.createdAt)} · {e.evaluatorName}</div>
                </div>
                <Btn size="sm" variant="warn" onClick={()=>setEditing(e)}>Continue</Btn>
              </div>
            </Card>
          ))}
        </div>
      )}

      <h3 style={{fontSize:13,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.8,marginBottom:12}}>Start New Evaluation</h3>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {myClients.filter(c=>c.status==='active').map(c=>{
          const due=daysUntil(c.nextDueDate);const overdue=isOverdue(c.nextDueDate);const soon=due!==null&&due>=0&&due<=5;
          return(
            <Card key={c.id} style={{cursor:'pointer',borderLeft:`3px solid ${overdue?'var(--danger)':soon?'var(--warn)':'var(--border)'}`}} onClick={()=>setSelected(c)}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{c.storeName}</div>
                  <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                    <span style={{fontSize:11,color:'var(--muted)'}}>{c.make}</span>
                    <span style={{fontSize:11,color:'var(--muted)'}}>{c.scheduler}</span>
                    {overdue&&<Badge color="red">Overdue</Badge>}
                    {soon&&!overdue&&<Badge color="amber">Due in {due}d</Badge>}
                  </div>
                </div>
                <div style={{color:'var(--accent)',fontSize:20}}>→</div>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
};

// ─── REPORTS PAGE ─────────────────────────────────────────────────────────────
const ReportsPage=({user,clients,evaluations})=>{
  const [groupBy,setGroupBy]=useState('client');
  const completed=evaluations.filter(e=>e.status==='complete');

  const groupData=useMemo(()=>{
    const groups={};
    completed.forEach(e=>{
      const key=groupBy==='client'?e.clientName:groupBy==='make'?e.make:e.scheduler;
      if(!groups[key])groups[key]={name:key,evals:[],scores:[],accuracy:[],call:[]};
      groups[key].evals.push(e);
      groups[key].scores.push(e.overallScore||0);
      groups[key].accuracy.push(e.accuracyScore||0);
      groups[key].call.push(e.callScore||0);
    });
    return Object.values(groups).map(g=>({
      ...g,
      avgScore:Math.round(g.scores.reduce((a,b)=>a+b,0)/g.scores.length),
      avgAccuracy:Math.round(g.accuracy.reduce((a,b)=>a+b,0)/g.accuracy.length),
      avgCall:Math.round(g.call.reduce((a,b)=>a+b,0)/g.call.length),
      count:g.evals.length
    })).sort((a,b)=>b.avgScore-a.avgScore);
  },[completed,groupBy]);

  const monthlyTrend=useMemo(()=>{
    const months={};
    completed.forEach(e=>{
      const d=new Date(e.completedAt||'');
      const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if(!months[k])months[k]={month:k,scores:[],count:0};
      months[k].scores.push(e.overallScore||0);
      months[k].count++;
    });
    return Object.values(months).map(m=>({...m,avg:Math.round(m.scores.reduce((a,b)=>a+b,0)/m.scores.length)})).sort((a,b)=>a.month>b.month?1:-1).slice(-6);
  },[completed]);

  const maxScore=Math.max(...monthlyTrend.map(m=>m.avg),100);

  return(
    <div className="fade-in">
      <div style={{marginBottom:22}}>
        <h2 style={{fontFamily:'var(--serif)',fontSize:24,fontWeight:400}}>Reports & Trends</h2>
        <p style={{color:'var(--muted)',fontSize:13,marginTop:2}}>Performance analytics across all evaluations</p>
      </div>
      {completed.length===0&&<Card style={{textAlign:'center',padding:40}}><p style={{color:'var(--muted)'}}>Complete some evaluations to see reports.</p></Card>}
      {completed.length>0&&<>
        {monthlyTrend.length>1&&<Card style={{marginBottom:18}}>
          <h3 style={{fontFamily:'var(--serif)',fontSize:16,marginBottom:16}}>Monthly Score Trend</h3>
          <div style={{display:'flex',alignItems:'flex-end',gap:8,height:120}}>
            {monthlyTrend.map(m=>(
              <div key={m.month} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{fontSize:11,color:'var(--accent)',fontWeight:600}}>{m.avg}%</div>
                <div style={{width:'100%',background:'var(--accent)',borderRadius:'4px 4px 0 0',height:`${(m.avg/maxScore)*100}px`,transition:'height .5s ease',opacity:.8}}/>

// ─── IMPORT CLIENTS PAGE ──────────────────────────────────────────────────────
const ImportPage=({user,clients,setClients})=>{
  const [step,setStep]=useState(0);
  const [csvRows,setCsvRows]=useState([]);
  const [csvHeaders,setCsvHeaders]=useState([]);
  const [mapping,setMapping]=useState({});
  const [previewData,setPreviewData]=useState([]);
  const [result,setResult]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef();

  const PQA_FIELDS=[
    {key:'storeName',label:'Dealership / Store Name',required:true},
    {key:'location',label:'Location (City, State)',required:false},
    {key:'make',label:'Make / Franchise',required:false},
    {key:'scheduler',label:'Service Scheduler',required:false},
    {key:'contactName',label:'Contact Name',required:false},
    {key:'contactEmail',label:'Contact Email',required:false},
    {key:'csm',label:'CSM / Account Manager',required:false},
    {key:'status',label:'Status (active/inactive)',required:false},
  ];

  const parseCSV=(text)=>{
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2)return{headers:[],rows:[]};
    const parseRow=(line)=>{
      const result=[];let cur='';let inQ=false;
      for(let i=0;i<line.length;i++){
        if(line[i]==='"'&&!inQ){inQ=true;}
        else if(line[i]==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
        else if(line[i]==='"'&&inQ){inQ=false;}
        else if(line[i]===','&&!inQ){result.push(cur.trim());cur='';}
        else{cur+=line[i];}
      }
      result.push(cur.trim());
      return result;
    };
    const headers=parseRow(lines[0]);
    const rows=lines.slice(1).map(l=>parseRow(l)).filter(r=>r.some(c=>c));
    return{headers,rows};
  };

  const autoMap=(headers)=>{
    const m={};
    const normalize=s=>s.toLowerCase().replace(/[^a-z]/g,'');
    const hints={
      storeName:['dealership','store','dealer','company','name','account'],
      location:['location','city','state','address'],
      make:['make','franchise','brand','oem'],
      scheduler:['scheduler','dms','software','system'],
      contactName:['contact','firstname','lastname','owner','rep'],
      contactEmail:['email','mail'],
      csm:['csm','accountmanager','manager','success'],
      status:['status','active'],
    };
    headers.forEach(h=>{
      const nh=normalize(h);
      Object.entries(hints).forEach(([field,keys])=>{
        if(!m[field]&&keys.some(k=>nh.includes(k)))m[field]=h;
      });
    });
    return m;
  };

  const handleFile=(file)=>{
    if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['csv','txt'].includes(ext)){alert('Please upload a CSV file.');return;}
    const reader=new FileReader();
    reader.onload=(e)=>{
      const{headers,rows}=parseCSV(e.target.result);
      if(!headers.length){alert('Could not parse file. Make sure it is a valid CSV.');return;}
      setCsvHeaders(headers);setCsvRows(rows);setMapping(autoMap(headers));setStep(1);
    };
    reader.readAsText(file);
  };

  const buildPreview=()=>{
    const mapped=csvRows.slice(0,5).map(row=>{
      const obj={};
      Object.entries(mapping).forEach(([field,col])=>{
        if(col){const idx=csvHeaders.indexOf(col);obj[field]=idx>=0?row[idx]:'';}
      });
      return obj;
    });
    setPreviewData(mapped);setStep(2);
  };

  const doImport=()=>{
    const existingNames=new Set(clients.map(c=>c.storeName?.toLowerCase().trim()));
    let added=0;let skipped=0;
    const newClients=[];
    csvRows.forEach(row=>{
      const obj={id:genId(),createdAt:today(),status:'active',nextDueDate:null,assignedTo:'',csm:'',make:'',scheduler:'',location:'',contactName:'',contactEmail:''};
      Object.entries(mapping).forEach(([field,col])=>{
        if(col){const idx=csvHeaders.indexOf(col);if(idx>=0)obj[field]=row[idx]||'';}
      });
      if(!obj.storeName){skipped++;return;}
      if(existingNames.has(obj.storeName.toLowerCase().trim())){skipped++;return;}
      existingNames.add(obj.storeName.toLowerCase().trim());
      if(obj.status){const s=obj.status.toLowerCase();obj.status=s.includes('active')&&!s.includes('in')?'active':s.includes('inactive')||s.includes('in')?'inactive':'active';}
      else{obj.status='active';}
      newClients.push(obj);added++;
    });
    setClients(prev=>[...prev,...newClients]);
    setResult({added,skipped,total:csvRows.length});setStep(3);
  };

  const reset=()=>{setStep(0);setCsvRows([]);setCsvHeaders([]);setMapping({});setPreviewData([]);setResult(null);};

  return(
    <div className="fade-in">
      <div style={{marginBottom:22}}>
        <h2 style={{fontFamily:'var(--serif)',fontSize:24,fontWeight:400}}>Import Clients from HubSpot</h2>
        <p style={{color:'var(--muted)',fontSize:13,marginTop:2}}>Upload a CSV export from HubSpot and map columns to the right fields</p>
      </div>
      <div style={{display:'flex',gap:0,marginBottom:28}}>
        {['Upload File','Map Columns','Preview','Done'].map((s,i)=>(
          <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:i===step?'var(--accent)':i<step?'var(--accent2)':'var(--surface2)',border:`2px solid ${i===step?'var(--accent)':i<step?'var(--accent2)':'var(--border)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,marginBottom:6}}>
              {i<step?'✓':i+1}
            </div>
            <div style={{fontSize:11,color:i===step?'var(--text)':'var(--muted)',fontWeight:i===step?600:400}}>{s}</div>
          </div>
        ))}
      </div>

      {step===0&&(
        <div className="slide-in">
          <Card style={{marginBottom:16}}>
            <h3 style={{fontFamily:'var(--serif)',fontSize:16,marginBottom:4}}>How to export from HubSpot</h3>
            <ol style={{paddingLeft:18,color:'var(--muted)',fontSize:13,lineHeight:2}}>
              <li>Go to HubSpot → <strong style={{color:'var(--text)'}}>Contacts</strong> or <strong style={{color:'var(--text)'}}>Companies</strong></li>
              <li>Click <strong style={{color:'var(--text)'}}>Actions → Export</strong></li>
              <li>Choose <strong style={{color:'var(--text)'}}>CSV</strong> format</li>
              <li>Download and upload the file below</li>
            </ol>
          </Card>
          <div
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}
            onClick={()=>fileRef.current.click()}
            style={{border:`2px dashed ${dragOver?'var(--accent)':'var(--border)'}`,borderRadius:14,padding:48,textAlign:'center',cursor:'pointer',background:dragOver?'rgba(59,130,246,.05)':'transparent',transition:'all .2s'}}>
            <div style={{fontSize:40,marginBottom:12}}>📂</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Drop your CSV file here</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>or click to browse</div>
            <Btn variant="ghost"><Icon.upload/> Choose File</Btn>
            <input ref={fileRef} type="file" accept=".csv,.txt" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
          </div>
        </div>
      )}

      {step===1&&(
        <div className="slide-in">
          <Card style={{marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <h3 style={{fontFamily:'var(--serif)',fontSize:16}}>Map Your HubSpot Columns</h3>
              <Badge color="green">{csvRows.length} rows found</Badge>
            </div>
            <p style={{fontSize:12,color:'var(--muted)',marginBottom:18}}>We auto-detected some matches — review and adjust as needed. <strong style={{color:'var(--accent2)'}}>Dealership Name is required.</strong></p>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {PQA_FIELDS.map(f=>(
                <div key={f.key} style={{display:'grid',gridTemplateColumns:'1fr 24px 1fr',alignItems:'center',gap:12}}>
                  <div style={{background:'var(--surface2)',border:`1px solid ${f.required?'var(--accent)':'var(--border)'}`,borderRadius:8,padding:'9px 12px',fontSize:13}}>
                    <span style={{fontWeight:600}}>{f.label}</span>
                    {f.required&&<span style={{color:'var(--danger)',marginLeft:4}}>*</span>}
                  </div>
                  <div style={{textAlign:'center',color:'var(--muted)',fontSize:16}}>→</div>
                  <select value={mapping[f.key]||''} onChange={e=>setMapping(p=>({...p,[f.key]:e.target.value}))}
                    style={{background:'var(--surface2)',border:`1px solid ${mapping[f.key]?'var(--accent2)':'var(--border)'}`,borderRadius:8,padding:'9px 12px',color:mapping[f.key]?'var(--text)':'var(--muted)',fontSize:13,outline:'none'}}>
                    <option value="">— skip this field —</option>
                    {csvHeaders.map(h=><option key={h} value={h}>{h}</option>)}
                  </select>
                </div>
              ))}
            </div>
          </Card>
          <Card style={{marginBottom:16}}>
            <h4 style={{fontSize:13,fontWeight:600,marginBottom:10,color:'var(--muted)'}}>YOUR HUBSPOT COLUMNS ({csvHeaders.length} total)</h4>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {csvHeaders.map(h=><span key={h} style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,padding:'3px 10px',fontSize:11,color:'var(--muted)'}}>{h}</span>)}
            </div>
          </Card>
          <div style={{display:'flex',gap:10,justifyContent:'space-between'}}>
            <Btn variant="ghost" onClick={reset}>← Start Over</Btn>
            <Btn onClick={buildPreview} disabled={!mapping.storeName} variant="success">Preview Import →</Btn>
          </div>
        </div>
      )}

      {step===2&&(
        <div className="slide-in">
          <Card style={{marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <h3 style={{fontFamily:'var(--serif)',fontSize:16}}>Preview (first 5 rows)</h3>
              <Badge color="blue">{csvRows.length} total to import</Badge>
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr>{PQA_FIELDS.filter(f=>mapping[f.key]).map(f=>(
                    <th key={f.key} style={{textAlign:'left',padding:'6px 10px',borderBottom:'1px solid var(--border)',color:'var(--muted)',fontWeight:600,whiteSpace:'nowrap'}}>{f.label}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {previewData.map((row,i)=>(
                    <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                      {PQA_FIELDS.filter(f=>mapping[f.key]).map(f=>(
                        <td key={f.key} style={{padding:'7px 10px',color:row[f.key]?'var(--text)':'var(--muted)',fontStyle:row[f.key]?'normal':'italic'}}>{row[f.key]||'—'}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Card>
          <Card style={{marginBottom:16,background:'rgba(245,158,11,.05)',borderColor:'rgba(245,158,11,.3)'}}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div style={{fontSize:20}}>⚠️</div>
              <div>
                <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Important — Next Due Dates</div>
                <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>All imported clients will have <strong style={{color:'var(--warn)'}}>no due date set</strong>. After importing, go to the <strong style={{color:'var(--text)'}}>Clients</strong> page and set each store's next due date manually. Evaluations are due every <strong style={{color:'var(--text)'}}>21 days</strong> and overdue after that.</p>
              </div>
            </div>
          </Card>
          <Card style={{marginBottom:16}}>
            <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.8}}>
              <div>📋 <strong style={{color:'var(--text)'}}>{csvRows.length}</strong> total rows in file</div>
              <div>✅ Duplicates (same dealership name) will be <strong style={{color:'var(--accent2)'}}>skipped automatically</strong></div>
              <div>📅 Due dates left blank — set manually after import</div>
            </div>
          </Card>
          <div style={{display:'flex',gap:10,justifyContent:'space-between'}}>
            <Btn variant="ghost" onClick={()=>setStep(1)}>← Back to Mapping</Btn>
            <Btn variant="success" onClick={doImport}><Icon.upload/> Import {csvRows.length} Clients</Btn>
          </div>
        </div>
      )}

      {step===3&&result&&(
        <div className="slide-in">
          <Card style={{textAlign:'center',padding:40,marginBottom:16}}>
            <div style={{fontSize:56,marginBottom:16}}>🎉</div>
            <h3 style={{fontFamily:'var(--serif)',fontSize:24,marginBottom:16}}>Import Complete!</h3>
            <div style={{display:'flex',gap:24,justifyContent:'center',marginBottom:24}}>
              <div><div style={{fontSize:32,fontFamily:'var(--serif)',color:'var(--accent2)'}}>{result.added}</div><div style={{fontSize:11,color:'var(--muted)'}}>CLIENTS ADDED</div></div>
              <div><div style={{fontSize:32,fontFamily:'var(--serif)',color:'var(--muted)'}}>{result.skipped}</div><div style={{fontSize:11,color:'var(--muted)'}}>SKIPPED (duplicates)</div></div>
              <div><div style={{fontSize:32,fontFamily:'var(--serif)',color:'var(--text)'}}>{result.total}</div><div style={{fontSize:11,color:'var(--muted)'}}>TOTAL IN FILE</div></div>
            </div>
            <div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:10,padding:14,marginBottom:24,textAlign:'left'}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:6}}>⚠️ Next Step — Set Due Dates</div>
              <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>Go to the <strong style={{color:'var(--text)'}}>Clients</strong> page and click the edit ✏️ button on each store to set their Next Due Date. Remember — evaluations are due every <strong style={{color:'var(--text)'}}>21 days</strong>.</p>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <Btn variant="ghost" onClick={reset}><Icon.upload/> Import Another File</Btn>
              <Btn variant="success" onClick={()=>window.location.hash='clients'}>Go to Clients →</Btn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App=()=>{
  const [user,setUser]=useState(()=>DB.get('pqa_session',null));
  const [page,setPage]=useState('dashboard');
  const [clients,setClients]=useState(()=>DB.get('pqa_clients',[]));
  const [evaluations,setEvaluations]=useState(()=>DB.get('pqa_evals',[]));
  const [pendingClient,setPendingClient]=useState(null);

  useEffect(()=>{DB.set('pqa_clients',clients);},[clients]);
  useEffect(()=>{DB.set('pqa_evals',evaluations);},[evaluations]);
  useEffect(()=>{DB.set('pqa_session',user);},[user]);

  useEffect(()=>{
    if(!user)return;
    const myClients=user.role==='manager'?clients:clients.filter(c=>c.assignedTo===user.id);
    const overdue=myClients.filter(c=>isOverdue(c.nextDueDate)&&c.status==='active');
    if(overdue.length>0){
      const lastNotif=DB.get('pqa_last_notif',null);
      const todayStr=today();
      if(lastNotif!==todayStr&&'Notification'in window){
        Notification.requestPermission().then(p=>{
          if(p==='granted'){
            new Notification('PQA Tracker',{body:`${overdue.length} evaluation${overdue.length>1?'s are':' is'} overdue!`,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">⚡</text></svg>'});
            DB.set('pqa_last_notif',todayStr);
          }
        });
      }
    }
  },[user,clients]);

  if(!user)return<LoginPage onLogin={u=>{setUser(u);setPage('dashboard');}}/>;

  const setClientsAndPersist=(v)=>setClients(v);
  const setEvalsAndPersist=(v)=>setEvaluations(v);

  return(
    <div style={{display:'flex'}}>
      <Sidebar user={user} page={page} setPage={setPage} onLogout={()=>{setUser(null);DB.set('pqa_session',null);}}/>
      <main style={{marginLeft:220,flex:1,padding:32,minHeight:'100vh'}}>
        {page==='dashboard'&&<Dashboard user={user} clients={clients} evaluations={evaluations} setPage={setPage}/>}
        {page==='clients'&&<ClientsPage user={user} clients={clients} setClients={setClientsAndPersist} evaluations={evaluations} setPage={setPage} setPendingClient={setPendingClient}/>}
        {page==='evaluations'&&<EvaluationsPage user={user} clients={clients} evaluations={evaluations} setEvaluations={setEvalsAndPersist} setClients={setClientsAndPersist} pendingClient={pendingClient} setPendingClient={setPendingClient}/>}
        {page==='history'&&<HistoryPage user={user} clients={clients} evaluations={evaluations} setEvaluations={setEvalsAndPersist} setClients={setClientsAndPersist}/>}
        {page==='reports'&&<ReportsPage user={user} clients={clients} evaluations={evaluations}/>}
        {page==='users'&&user.role==='manager'&&<TeamPage user={user} clients={clients} evaluations={evaluations}/>}
        {page==='import'&&user.role==='manager'&&<ImportPage user={user} clients={clients} setClients={setClientsAndPersist}/>}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
